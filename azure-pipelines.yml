trigger:
  branches:
    include:
      - main 

pool:
  name: 'FraudEngineAgentPool' 

stages:

    - stage: CI
      
      jobs:
        
        - job: BuildAndPublish
          
          steps:
            
            - task: VSBuild@1
              inputs:
                solution: '**/*.sln'
                platform: 'Any CPU'
                configuration: 'Release'
                msbuildArgs: '/t:Restore,Build'

            - task: CopyFiles@2
              inputs:
                Contents: '**/*.dacpac'
                TargetFolder: '$(Build.ArtifactStagingDirectory)'

            - task: PublishBuildArtifacts@1
              inputs:
                PathtoPublish: '$(Build.ArtifactStagingDirectory)'
                ArtifactName: 'dacpac'


    - stage: CD

      dependsOn: CI

      jobs:
        
        - job: DeployDatabase

          steps:
            
            - download: current
              artifact: dacpac

            - task: SqlDacpacDeploymentOnMachineGroup@0
              inputs:
                TaskType: dacpac
                DacpacFile: $(Pipeline.Workspace)/dacpac/**/*.dacpac
                TargetMethod: server
                ServerName: localhost
                DatabaseName: FraudEngineDB
                AuthScheme: windowsAuthentication

        