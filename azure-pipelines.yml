trigger:
  branches:
    include:
      - main 

pool:
  name: 'FraudEngineAgentPool' 

stages:

    - stage: CI
      
      jobs:
        
        - job: BuildAndPublish
          
          steps:
            
            - task: VSBuild@1
              inputs:
                solution: '**/*.sln'
                platform: 'Any CPU'
                configuration: 'Release'
                msbuildArgs: '/t:Restore,Build'

            - task: CopyFiles@2
              inputs:
                Contents: '**/*.dacpac'
                TargetFolder: '$(Build.ArtifactStagingDirectory)'

            - task: PublishBuildArtifacts@1
              inputs:
                PathtoPublish: '$(Build.ArtifactStagingDirectory)'
                ArtifactName: 'dacpac'


    - stage: CD

      dependsOn: CI

      jobs:
        
        - job: DeployDatabase

          steps:
            
            - download: current
              artifact: dacpac

            - powershell: |
                Write-Host "Installing SqlPackage tool..."
                dotnet tool install -g Microsoft.SqlPackage

                $dacpacs = Get-ChildItem "$(Pipeline.Workspace)\dacpac" -Recurse -Filter *.dacpac
                if ($dacpacs.Count -eq 0) {
                    Write-Error "No DACPAC files found!"
                    exit 1
                }
                $dacpac = $dacpacs[0]
                Write-Host "Found DACPAC: $($dacpac.FullName)"
                
                & "$env:USERPROFILE\.dotnet\tools\sqlpackage.exe" /Action:Publish `
                                /SourceFile:"$($dacpac.FullName)" `
                                /TargetConnectionString:"Server=localhost\MSSQLSERVER01;Database=master;Trusted_Connection=True;TrustServerCertificate=True;"
              displayName: 'Install and Deploy DACPAC via PowerShell'