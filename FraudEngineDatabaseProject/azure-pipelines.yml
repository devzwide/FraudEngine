trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'windows-latest'

steps:
- task: DotNetCoreCLI@2
  displayName: 'Build SQL Project'
  inputs:
    command: 'build'
    projects: '**/*.sqlproj'
    arguments: '--configuration Release'
- task: PublishBuildArtifacts@1
  displayName: 'Publish DACPAC Artifact'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)/FraudEngineDatabaseProject/bin/Release'
    ArtifactName: 'dacpac'